<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test interactivo | Complementos de Física y Química</title>
  <style>
    :root {
      --bg: #f6f7fb; --card: #ffffff; --text: #172033; --muted: #667085;
      --line: #d9dee8; --primary: #2563eb; --primary-dark:#1d4ed8;
      --ok: #138a36; --bad: #c62828; --okbg:#e9f8ee; --badbg:#fdecec; --warn:#f59e0b;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
    header { background: linear-gradient(135deg, #16213e, #2563eb); color:white; padding: 28px 18px; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { margin:0 0 8px; font-size: clamp(1.6rem, 3vw, 2.4rem); }
    .subtitle { margin:0; color:#e8eefc; }
    .toolbar, .card { background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow: 0 6px 18px rgba(16,24,40,.06); }
    .toolbar { margin: -22px auto 18px; padding: 14px; display:grid; gap:12px; grid-template-columns: 1.2fr .8fr .8fr auto auto; align-items:center; }
    input, select, button { font: inherit; border-radius: 12px; border:1px solid var(--line); padding: 10px 12px; background:white; }
    button { cursor:pointer; background:var(--primary); color:white; border-color:var(--primary); font-weight:650; }
    button.secondary { background:white; color:var(--primary); }
    button:hover { filter:brightness(.97); }
    main.wrap { padding: 0 18px 32px; }
    .stats { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-bottom:18px; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; }
    .stat b { display:block; font-size:1.45rem; }
    .stat span { color:var(--muted); font-size:.92rem; }
    .card { padding:20px; margin-bottom:16px; }
    .qtop { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:10px; }
    .badge { display:inline-flex; gap:6px; align-items:center; background:#eef2ff; color:#3730a3; border-radius:999px; padding:5px 10px; font-size:.82rem; font-weight:650; white-space:nowrap; }
    .question { font-size:1.08rem; font-weight:700; line-height:1.35; margin:0 0 14px; }
    .options { display:grid; gap:9px; }
    .option { width:100%; text-align:left; background:white; color:var(--text); border:1px solid var(--line); border-radius:14px; padding:12px 14px; font-weight:500; }
    .option .letter { font-weight:800; margin-right:8px; color:#344054; }
    .option.correct { background:var(--okbg); border-color:#77c590; color:#0f6529; }
    .option.incorrect { background:var(--badbg); border-color:#f0a7a7; color:#9a1b1b; }
    .feedback { display:none; margin-top:14px; padding:12px 14px; border-radius:14px; border:1px solid var(--line); }
    .feedback.ok { display:block; background:var(--okbg); border-color:#77c590; }
    .feedback.bad { display:block; background:var(--badbg); border-color:#f0a7a7; }
    .muted { color:var(--muted); }
    .hidden { display:none !important; }
    .footer-actions { display:flex; gap:10px; justify-content:center; margin:22px 0; flex-wrap:wrap; }
    .review { background:#fff7ed; border-color:#fed7aa; }
    .small { font-size:.9rem; color:var(--muted); }
    @media (max-width: 850px) { .toolbar { grid-template-columns:1fr; } .stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Test interactivo: Complementos de Física y Química</h1>
    <p class="subtitle">Banco actualizado · preguntas mezcladas · corrección inmediata · justificación incluida</p>
  </div>
</header>
<main class="wrap">
  <section class="toolbar">
    <input id="search" placeholder="Buscar pregunta, opción o bloque…" />
    <select id="blockFilter"><option value="all">Todos los bloques</option></select>
    <select id="mode">
      <option value="all">Todas las preguntas</option>
      <option value="unanswered">Solo sin responder</option>
      <option value="wrong">Solo falladas</option>
      <option value="right">Solo acertadas</option>
    </select>
    <button id="shuffleBtn" class="secondary">Mezclar</button>
    <button id="resetBtn" class="secondary">Reiniciar</button>
  </section>

  <section class="stats">
    <div class="stat"><b id="total">0</b><span>preguntas visibles</span></div>
    <div class="stat"><b id="answered">0</b><span>respondidas</span></div>
    <div class="stat"><b id="score">0</b><span>aciertos</span></div>
    <div class="stat"><b id="percent">0%</b><span>resultado</span></div>
  </section>

  <section id="summary" class="card review hidden"></section>
  <section id="quiz"></section>
  <div class="footer-actions">
    <button id="showSummary">Ver resumen</button>
    <button id="topBtn" class="secondary">Volver arriba</button>
  </div>
</main>

let order = [...Array(QUESTIONS.length).keys()];
let answers = JSON.parse(localStorage.getItem('cfq_answers_v2') || '{}');
const byId = id => document.getElementById(id);

function shuffleArray(a) {
  for (let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function save() { localStorage.setItem('cfq_answers_v2', JSON.stringify(answers)); }
function blocks() { return [...new Set(QUESTIONS.map(q => q.block))].sort(); }
function initFilters() {
  const sel = byId('blockFilter');
  blocks().forEach(b => { const o=document.createElement('option'); o.value=b; o.textContent=b; sel.appendChild(o); });
}
function getFiltered() {
  const term = byId('search').value.trim().toLowerCase();
  const block = byId('blockFilter').value;
  const mode = byId('mode').value;
  return order.map(i => QUESTIONS[i]).filter(q => {
    const a = answers[q.id];
    const text = [q.question, q.block, ...Object.values(q.options)].join(' ').toLowerCase();
    if (block !== 'all' && q.block !== block) return false;
    if (term && !text.includes(term)) return false;
    if (mode === 'unanswered' && a) return false;
    if (mode === 'wrong' && (!a || a.choice === q.answer)) return false;
    if (mode === 'right' && (!a || a.choice !== q.answer)) return false;
    return true;
  });
}
function render() {
  const qs = getFiltered();
  const quiz = byId('quiz'); quiz.innerHTML = '';
  qs.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx+1)));
  updateStats(qs);
}
function renderQuestion(q, visibleIndex) {
  const chosen = answers[q.id]?.choice;
  const answered = Boolean(chosen);
  const ok = chosen === q.answer;
  const card = document.createElement('article'); card.className = 'card';
  const top = document.createElement('div'); top.className='qtop';
  top.innerHTML = `<span class="badge">${visibleIndex} / ${QUESTIONS.length}</span><span class="badge">${escapeHtml(q.block)}</span>`;
  const h = document.createElement('p'); h.className='question'; h.textContent = q.question;
  const opts = document.createElement('div'); opts.className='options';
  ['A','B','C','D'].forEach(letter => {
    const btn = document.createElement('button'); btn.className='option'; btn.type='button';
    btn.innerHTML = `<span class="letter">${letter}.</span>${escapeHtml(q.options[letter])}`;
    if (answered) {
      btn.disabled = true;
      if (letter === q.answer) btn.classList.add('correct');
      if (letter === chosen && chosen !== q.answer) btn.classList.add('incorrect');
    }
    btn.addEventListener('click', () => { answers[q.id] = {choice: letter}; save(); render(); });
    opts.appendChild(btn);
  });
  const fb = document.createElement('div');
  fb.className = 'feedback ' + (answered ? (ok ? 'ok' : 'bad') : '');
  if (answered) {
    fb.innerHTML = `<b>${ok ? 'Correcto' : 'Incorrecto'}.</b> Respuesta correcta: <b>${q.answer}</b>. <br>${escapeHtml(q.explanation)}`;
  }
  card.append(top,h,opts,fb);
  return card;
}
function updateStats(qs) {
  const visibleIds = new Set(qs.map(q => String(q.id)));
  const answeredVisible = Object.entries(answers).filter(([id]) => visibleIds.has(id));
  const rightVisible = answeredVisible.filter(([id,a]) => QUESTIONS.find(q => q.id == id)?.answer === a.choice);
  byId('total').textContent = qs.length;
  byId('answered').textContent = answeredVisible.length;
  byId('score').textContent = rightVisible.length;
  byId('percent').textContent = answeredVisible.length ? Math.round(100*rightVisible.length/answeredVisible.length)+'%' : '0%';
}
function renderSummary() {
  const answered = Object.entries(answers).map(([id,a]) => [QUESTIONS.find(q => q.id == id), a]).filter(x => x[0]);
  const right = answered.filter(([q,a]) => q.answer === a.choice).length;
  const wrong = answered.length - right;
  const pending = QUESTIONS.length - answered.length;
  const wrongList = answered.filter(([q,a]) => q.answer !== a.choice).map(([q,a]) => `<li><b>${escapeHtml(q.question)}</b><br><span class="small">Tu respuesta: ${a.choice} · Correcta: ${q.answer}</span></li>`).join('');
  byId('summary').classList.remove('hidden');
  byId('summary').innerHTML = `<h2>Resumen</h2><p><b>Aciertos:</b> ${right} · <b>Fallos:</b> ${wrong} · <b>Pendientes:</b> ${pending} · <b>Total:</b> ${QUESTIONS.length}</p>${wrong ? '<h3>Preguntas falladas</h3><ol>'+wrongList+'</ol>' : '<p>No hay fallos registrados.</p>'}`;
  byId('summary').scrollIntoView({behavior:'smooth'});
}
function escapeHtml(s) { return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

byId('shuffleBtn').addEventListener('click', () => { shuffleArray(order); render(); });
byId('resetBtn').addEventListener('click', () => { if(confirm('¿Borrar todas las respuestas guardadas?')) { answers={}; save(); byId('summary').classList.add('hidden'); render(); } });
byId('showSummary').addEventListener('click', renderSummary);
byId('topBtn').addEventListener('click', () => scrollTo({top:0, behavior:'smooth'}));
['search','blockFilter','mode'].forEach(id => byId(id).addEventListener('input', render));
initFilters(); shuffleArray(order); render();
</script>
