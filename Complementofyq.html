let questions = [];
let current = 0;
let answers = new Map();

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function normalize(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
function applyFilters() {
  const topic = document.getElementById('topicFilter').value;
  const term = normalize(document.getElementById('search').value);
  let base = BANK.filter(q => topic==='all' || q.source===topic);
  if (term) base = base.filter(q => normalize(q.question + ' ' + q.options.map(o=>o.text).join(' ')).includes(term));
  questions = shuffle(base);
  current = 0;
  answers = new Map();
  render();
}
function initTopics() {
  const select = document.getElementById('topicFilter');
  [...new Set(BANK.map(q=>q.source))].sort().forEach(t => {
    const opt = document.createElement('option'); opt.value=t; opt.textContent=t; select.appendChild(opt);
  });
}
function renderStats() {
  const vals = [...answers.values()];
  const ok = vals.filter(a=>a.correct).length;
  const bad = vals.filter(a=>!a.correct).length;
  document.getElementById('totalQ').textContent = questions.length;
  document.getElementById('score').textContent = ok;
  document.getElementById('mistakes').textContent = bad;
  document.getElementById('bar').style.width = questions.length ? `${Math.round(vals.length/questions.length*100)}%` : '0%';
}
function render() {
  renderStats();
  document.getElementById('review').style.display='none';
  if (!questions.length) {
    document.getElementById('counter').textContent = 'Sin resultados';
    document.getElementById('source').textContent = '';
    document.getElementById('question').textContent = 'No hay preguntas que coincidan con el filtro.';
    document.getElementById('answers').innerHTML = '';
    document.getElementById('feedback').className = 'feedback';
    return;
  }
  const q = questions[current];
  document.getElementById('counter').textContent = `Pregunta ${current+1} / ${questions.length}`;
  document.getElementById('source').textContent = q.source;
  document.getElementById('question').textContent = q.question;
  const selected = answers.get(current);
  const box = document.getElementById('answers');
  box.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer';
    btn.innerHTML = `<strong>${opt.label}.</strong> ${opt.text}`;
    btn.onclick = () => choose(opt.label);
    if (selected) {
      btn.disabled = true;
      if (opt.label === q.correct) btn.classList.add('correct');
      if (opt.label === selected.choice && opt.label !== q.correct) btn.classList.add('wrong');
    }
    box.appendChild(btn);
  });
  const fb = document.getElementById('feedback');
  if (selected) {
    fb.className = 'feedback ' + (selected.correct ? 'ok' : 'bad');
    fb.innerHTML = `<strong>${selected.correct ? 'Correcto' : 'Incorrecto'}.</strong><br>${q.explanation}`;
  } else {
    fb.className = 'feedback'; fb.innerHTML='';
  }
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').textContent = current===questions.length-1 ? 'Finalizar' : 'Siguiente';
}
function choose(label) {
  const q=questions[current];
  answers.set(current, {choice:label, correct:label===q.correct});
  render();
}
document.getElementById('nextBtn').onclick = () => { if (current < questions.length-1) current++; render(); };
document.getElementById('prevBtn').onclick = () => { if (current > 0) current--; render(); };
document.getElementById('restartBtn').onclick = () => applyFilters();
document.getElementById('topicFilter').onchange = applyFilters;
document.getElementById('search').oninput = applyFilters;
document.getElementById('reviewBtn').onclick = () => {
  const el = document.getElementById('review');
  const vals=[...answers.values()];
  const ok=vals.filter(a=>a.correct).length;
  let html = `<h2>Resumen</h2><p><strong>${ok} / ${questions.length}</strong> aciertos. Respondidas: ${vals.length}.</p>`;
  questions.forEach((q,i) => {
    const a=answers.get(i);
    const state = !a ? 'Sin responder' : (a.correct ? 'Correcta' : `Incorrecta. Marcaste ${a.choice}`);
    html += `<details><summary>${i+1}. ${state} — ${q.question}</summary><p class="small">Bloque: ${q.source}</p><p>${q.explanation}</p></details>`;
  });
  el.innerHTML=html;
  el.style.display='block';
  el.scrollIntoView({behavior:'smooth', block:'start'});
};
initTopics();
applyFilters();
</script>
